version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/android"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/London"
    assignees:
      - "RafaRuiz"
    groups:
      gradle-patch:
        patterns: ["*"]
        update-types: ["patch"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/London"
    assignees:
      - "RafaRuiz"
    groups:
      actions-all:
        patterns: ["*"]
        update-types: ["major", "minor", "patch"]
